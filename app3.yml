apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
spec:
  replicas: 4
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
      - name: app3
        image: gcr.io/google-samples/hello-app:2.0
        resources:
          request:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 8080
